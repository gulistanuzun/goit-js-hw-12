<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <link rel="stylesheet" href="./css/styles.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/simplelightbox/dist/simple-lightbox.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/simplelightbox/dist/simple-lightbox.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Image Search</h1>
    </header>

    <form id="search-form">
      <input
        type="text"
        name="searchQuery"
        placeholder="Search images..."
        required
      />
      <button type="submit">Search</button>
    </form>

    <ul class="gallery"></ul>

    <button class="load-more hidden">Load more</button>

    <div class="loader hidden"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
